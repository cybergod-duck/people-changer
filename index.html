<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptChan Pro Studio | Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020202;
            color: #e5e7eb;
            overflow: hidden;
        }

        .mono {
            font-family: 'Fira Code', monospace;
        }

        .glass {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-scroll::-webkit-scrollbar {
            width: 3px;
        }

        .chat-scroll::-webkit-scrollbar-thumb {
            background: #22c55e;
            border-radius: 10px;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.6;
            }
        }

        .glow-line {
            animation: pulse-glow 2s infinite;
        }

        .generating {
            border: 2px solid #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>

<body class="h-screen flex flex-col">

    <!-- TOP HEADER -->
    <header class="h-16 border-b border-white/5 flex items-center justify-between px-8 glass z-50">
        <div class="flex items-center gap-4">
            <div class="relative">
                <div class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_12px_#22c55e]"></div>
                <div class="absolute inset-0 w-3 h-3 rounded-full bg-green-400 animate-ping opacity-20"></div>
            </div>
            <h1 class="text-xs font-black tracking-[0.3em] uppercase mono text-white/90">
                PromptChan <span class="text-green-500">Elite</span> Node
            </h1>
        </div>
        <div class="flex items-center gap-6">
            <div id="api-status"
                class="text-[9px] mono text-zinc-500 uppercase tracking-widest bg-white/5 px-3 py-1 rounded-full border border-white/5">
                Nexus Idle
            </div>
            <button onclick="toggleSettings()"
                class="text-zinc-400 hover:text-white transition-all transform hover:rotate-90">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">

        <!-- LEFT: PARAMETERS -->
        <aside class="w-80 bg-zinc-950/50 border-r border-white/5 p-6 flex flex-col gap-8">
            <section>
                <div class="flex items-center justify-between mb-4">
                    <label class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 font-bold">Style Profile</label>
                    <span class="text-[9px] text-green-500 mono">XL+ ACTIVE</span>
                </div>
                <select id="style-select"
                    class="w-full bg-zinc-900 border border-white/10 rounded-xl px-4 py-3 text-xs focus:border-green-500 outline-none transition-all">
                    <option value="Hyperreal">Hyperreal</option>
                    <option value="Hyperreal XL+ v2">Hyperreal XL+ v2</option>
                    <option value="Anime XL+">Anime XL+</option>
                    <option value="Hardcore XL">Hardcore XL</option>
                    <option value="Cinematic">Cinematic</option>
                </select>
            </section>

            <section>
                <label class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 font-bold mb-4 block">Visual DNA
                    (Ref)</label>
                <div id="dropzone"
                    class="border border-white/5 rounded-2xl h-44 flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 transition-all relative overflow-hidden bg-zinc-900/20 group">
                    <input type="file" id="file-upload" class="hidden" accept="image/*">
                    <div id="upload-prompt" class="text-center group-hover:scale-110 transition-transform">
                        <svg class="mx-auto mb-2 text-zinc-700" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p class="text-[9px] text-zinc-600 mono uppercase">Inject Source</p>
                    </div>
                    <img id="ref-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                </div>
                <button id="vision-btn" onclick="analyzeReference()"
                    class="w-full mt-3 bg-white/5 hover:bg-white/10 text-white py-2.5 rounded-xl text-[9px] mono uppercase tracking-widest border border-white/5 hidden">Scan
                    DNA</button>
            </section>

            <section class="mt-auto space-y-4">
                <div class="p-4 bg-zinc-900/50 border border-white/5 rounded-2xl">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[9px] mono text-zinc-500 uppercase">Live Output Feed</span>
                        <div id="feed-status" class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
                    </div>
                    <div id="live-prompt-view"
                        class="h-20 text-[9px] mono text-zinc-600 overflow-hidden line-clamp-4 leading-relaxed italic">
                        Awaiting data stream from Grok...
                    </div>
                </div>
                <button onclick="triggerGeneration()" id="generate-btn"
                    class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-5 rounded-2xl shadow-[0_0_20px_rgba(34,197,94,0.1)] transition-all transform active:scale-95 mono text-xs">
                    EXECUTE RENDER
                </button>
            </section>
        </aside>

        <!-- CENTER: CANVAS -->
        <section class="flex-1 bg-[#010101] flex flex-col items-center justify-center p-12 relative">
            <!-- Background Decoration -->
            <div class="absolute inset-0 opacity-10 pointer-events-none">
                <div
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-green-500/20 blur-[120px] rounded-full">
                </div>
            </div>

            <div id="canvas-container"
                class="w-full max-w-lg aspect-[3/4] glass rounded-[2.5rem] overflow-hidden relative shadow-2xl transition-all duration-700">
                <div id="loader"
                    class="absolute inset-0 bg-black/90 z-20 hidden flex flex-col items-center justify-center">
                    <div class="w-12 h-12 border border-green-500/20 border-t-green-500 rounded-full animate-spin mb-6">
                    </div>
                    <div class="text-center space-y-2">
                        <p class="mono text-green-500 text-[10px] tracking-[0.4em] uppercase">Rendering Asset</p>
                        <p id="render-stage" class="text-[8px] mono text-zinc-500 uppercase">Bypassing Gateways...</p>
                    </div>
                </div>

                <img id="main-image" class="w-full h-full object-contain hidden relative z-10">

                <div id="canvas-placeholder"
                    class="absolute inset-0 flex flex-col items-center justify-center text-zinc-800 space-y-4">
                    <div class="w-16 h-16 border border-white/5 rounded-full flex items-center justify-center">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </div>
                    <p class="mono text-[10px] uppercase tracking-[0.3em] opacity-40">Ready for Command</p>
                </div>
            </div>

            <div id="canvas-actions" class="hidden mt-8 flex gap-3">
                <button onclick="downloadResult()"
                    class="px-8 py-3 bg-zinc-900 border border-white/10 rounded-full text-[10px] mono uppercase hover:bg-white hover:text-black transition-all">Archive
                    Data</button>
                <button onclick="clearCanvas()"
                    class="px-8 py-3 bg-zinc-900 border border-white/10 rounded-full text-[10px] mono uppercase hover:bg-red-500 transition-all">Purge</button>
            </div>
        </section>

        <!-- RIGHT: GROK CHAT -->
        <aside class="w-[400px] bg-zinc-950 border-l border-white/5 flex flex-col shadow-2xl">
            <div class="p-6 border-b border-white/5 bg-zinc-900/20 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                    <span
                        class="text-[10px] font-black mono uppercase tracking-widest text-zinc-300">Grok-4.1-Fast</span>
                </div>
                <div class="text-[9px] mono text-zinc-600 bg-black/50 px-2 py-1 rounded">V-4.1.0</div>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 chat-scroll space-y-6">
                <!-- Messages -->
            </div>

            <div class="p-6">
                <div class="relative group">
                    <textarea id="chat-input" rows="1"
                        class="w-full bg-zinc-900/80 border border-white/10 rounded-2xl px-5 py-4 text-sm focus:border-green-500/50 outline-none transition-all resize-none pr-14"
                        placeholder="Input scene parameters..."></textarea>
                    <button onclick="handleChat()"
                        class="absolute right-3 bottom-3 p-2.5 bg-green-600 hover:bg-green-500 rounded-xl transition-all shadow-lg active:scale-90">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="m22 2-7 20-4-9-9-4Z"></path>
                            <path d="M22 2 11 13"></path>
                        </svg>
                    </button>
                </div>
                <div class="mt-4 flex items-center justify-center gap-4 opacity-30">
                    <div class="h-[1px] flex-1 bg-white/10"></div>
                    <span class="text-[8px] mono uppercase tracking-[0.2em]">Neural Link Stable</span>
                    <div class="h-[1px] flex-1 bg-white/10"></div>
                </div>
            </div>
        </aside>
    </main>

    <!-- SETTINGS -->
    <div id="settings-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[2.5rem] border border-white/10 shadow-3xl">
            <h2 class="mono font-black text-xs uppercase mb-8 tracking-[0.4em] text-white">Security Override</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[9px] text-zinc-500 uppercase mono mb-2 block tracking-widest">OpenRouter
                        Key</label>
                    <div
                        class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-xs mono text-zinc-600 outline-none">
                        OR Key moved to Vercel api/grok for security and headers
                    </div>
                </div>
                <div>
                    <label class="text-[9px] text-zinc-500 uppercase mono mb-2 block tracking-widest">PromptChan
                        Key</label>
                    <input id="pc-key" type="password" placeholder="Enter PromptChan Key"
                        class="w-full bg-black border border-white/10 rounded-xl p-3 text-xs mono text-green-500 focus:border-green-500 outline-none">
                </div>
            </div>
            <button onclick="toggleSettings()"
                class="w-full mt-10 bg-white text-black font-black py-4 rounded-2xl text-[10px] mono uppercase tracking-widest hover:bg-zinc-200 transition-all">Initialize
                Studio</button>
        </div>
    </div>

    <script>
        let currentPrompt = "";
        let currentNegative = "";
        let currentPayload = {};
        let history = [];
        let editCount = 0;
        const MAX_EDITS = 3;

        async function handleChat() {
            if (editCount >= MAX_EDITS) {
                addMsg('assistant', "Maximum edits reached. Prompt is locked in.");
                return;
            }

            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;

            addMsg('user', msg);
            input.value = '';
            input.style.height = 'auto';
            setStatus('Grok Engineering...');

            const mainImg = document.getElementById('main-image');
            const hasImage = mainImg.src && !mainImg.classList.contains('hidden');
            let userMsgContent = msg;

            if (editCount === 0 && hasImage) {
                userMsgContent = [
                    { type: "text", text: msg },
                    { type: "image_url", image_url: { url: mainImg.src } }
                ];
            }

            const userMessageObj = { role: "user", content: userMsgContent };

            try {
                const res = await fetch("/api/grok", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "x-ai/grok-4.1-fast",
                        messages: [
                            {
                                role: "system",
                                content: `You are an Elite NSFW Prompt Engineer. Your job is to create the perfect prompt based on the user's physical description requests AND the stylistic photo provided across iterative turns. Output ONLY valid JSON matching this exact schema:
{
  "style": "Cinematic",
  "poses": "Default",
  "filter": "Default",
  "emotion": "Default",
  "detail": 0.0,
  "prompt": "detailed prompt string",
  "seed": 0,
  "quality": "Ultra",
  "creativity": 0,
  "image_size": "512x512",
  "negative_prompt": "negative prompt string",
  "restore_faces": true,
  "age_slider": 0,
  "weight_slider": 0.0,
  "breast_slider": 0.0,
  "ass_slider": 0.0
}`
                            },
                            ...history,
                            userMessageObj
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

                    if(!data.choices?.[0]?.message?.content) {
                        throw new Error('Invalid response: no choices or content');
            }

                let aiData;
            try {
                aiData = JSON.parse(data.choices[0].message.content);
            } catch (e) {
                const content = data.choices[0].message.content;
                const jsonMatch = /\{[\s\S]*?\}/.exec(content);
                if (jsonMatch) {
                    aiData = JSON.parse(jsonMatch[0]);
                } else {
                    throw new Error(`JSON parse failed: ${e.message}. Content preview: ${content.substring(0, 200)}...`);
                }
            }

            // ACTUAL CONNECTION: Grok to Global State
            currentPayload = aiData;
            currentPrompt = aiData.prompt || aiData.positive_prompt || '';
            currentNegative = aiData.negative_prompt || aiData.negativePrompt || aiData.neg_prompt || '';

            // UI UPDATE: The Live Output Feed
            updateLiveFeed(currentPrompt);

            history.push(userMessageObj);
            history.push({ role: "assistant", content: data.choices[0].message.content });

            editCount++;
            addMsg('assistant', `Vector analysis complete. Edit ${editCount}/${MAX_EDITS} used.\n\nPrompt: ${currentPrompt}`);

            if (editCount >= MAX_EDITS) {
                input.disabled = true;
                input.placeholder = "Prompt Locked In.";
                addMsg('assistant', "Max edits reached. Final prompt locked in. It is photo + final description = output.");
            }

            if (msg.toLowerCase().match(/\b(go|generate|make|render|execute)\b/)) {
                triggerGeneration();
            }
        } catch (e) {
            addMsg('assistant', `Sync Error: ${e.message}`);
        } finally { setStatus('System Ready'); }
        }

        async function triggerGeneration() {
            if (!currentPayload) return addMsg('assistant', "No PromptChan payload generated. Initiate Grok first.");

            const loader = document.getElementById('loader');
            const canvas = document.getElementById('canvas-container');
            const btn = document.getElementById('generate-btn');
            const stage = document.getElementById('render-stage');

            loader.classList.remove('hidden');
            canvas.classList.add('generating');
            btn.disabled = true;
            stage.innerText = "Syncing with Node...";

            const payload = {
                ...currentPayload,
                style: document.getElementById('style-select').value,
                seed: Math.floor(Math.random() * 1000000000)
            };

            // Redirecting through Vercel Serverless to bypass CORS headers
            const target = "/api/promptchan";

            try {
                stage.innerText = "Decrypting Response...";
                const res = await fetch(target, {
                    method: "POST",
                    headers: {
                        "x-api-key": document.getElementById('pc-key').value,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errTxt = await res.text();
                    throw new Error(errTxt || "Gateway Timeout");
                }

                const data = await res.json();
                if (data.image) {
                    const img = document.getElementById('main-image');
                    img.src = `data:image/png;base64,${data.image}`;
                    img.classList.remove('hidden');
                    document.getElementById('canvas-placeholder').classList.add('hidden');
                    document.getElementById('canvas-actions').classList.remove('hidden');
                    stage.innerText = "Asset Finalized";
                }
            } catch (e) {
                addMsg('assistant', `PromptChan Link Failed: ${e.message}`);
                stage.innerText = "Link Interrupted";
            } finally {
                setTimeout(() => {
                    loader.classList.add('hidden');
                    canvas.classList.remove('generating');
                    btn.disabled = false;
                }, 1000);
            }
        }

        // === UI & HELPERS ===
        function updateLiveFeed(text) {
            const feed = document.getElementById('live-prompt-view');
            const status = document.getElementById('feed-status');
            feed.innerText = text;
            status.classList.remove('bg-zinc-800');
            status.classList.add('bg-green-500', 'shadow-[0_0_8px_#22c55e]');
        }

        function addMsg(role, text) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `p-5 rounded-2xl text-[11px] leading-relaxed transition-all ${role === 'user' ? 'bg-blue-600/10 text-blue-200 border border-blue-500/20 ml-8' : 'bg-zinc-900 border border-white/5 text-zinc-400 mr-8'}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function setStatus(t) { document.getElementById('api-status').innerText = t; }
        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }

        function setupDragAndDrop() {
            const dz = document.getElementById('dropzone');
            dz.onclick = () => document.getElementById('file-upload').click();
            document.getElementById('file-upload').onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const preview = document.getElementById('ref-preview');
                    preview.src = ev.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-prompt').classList.add('hidden');
                    document.getElementById('vision-btn').classList.remove('hidden');

                    if (typeof editCount !== 'undefined') {
                        editCount = 0;
                        history = [];
                        const input = document.getElementById('chat-input');
                        input.disabled = false;
                        input.placeholder = "Input scene parameters...";
                    }
                };
                reader.readAsDataURL(file);
            };
        }

        async function analyzeReference() {
            const src = document.getElementById('ref-preview').src;
            const mainImg = document.getElementById('main-image');
            mainImg.src = src;
            mainImg.classList.remove('hidden');
            document.getElementById('canvas-placeholder').classList.add('hidden');
            document.getElementById('canvas-actions').classList.remove('hidden');

            addMsg('assistant', "Photo locked on main screen. What is your basic prompt instruction? (0/3 Edits)");
            document.getElementById('chat-input').focus();
        }
        function clearCanvas() {
            document.getElementById('main-image').classList.add('hidden');
            document.getElementById('canvas-placeholder').classList.remove('hidden');
            document.getElementById('canvas-actions').classList.add('hidden');
        }
        function downloadResult() {
            const a = document.createElement('a');
            a.download = `PC-ELITE-${Date.now()}.png`;
            a.href = document.getElementById('main-image').src;
            a.click();
        }

        window.onload = () => { setupDragAndDrop(); };
        const tx = document.getElementById('chat-input');
        tx.addEventListener('input', function () { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
    </script>
</body>

</html>
